name: release

on:
  push:
    tags:
      - "release-*"

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always
  AUR_PACKAGE_NAME: gvm-bin

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Run tests
        run: cargo test --locked

  build-release:
    needs: verify
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - archive_target: linux-x86_64
            rust_target: x86_64-unknown-linux-musl
            binary_path: ./target/x86_64-unknown-linux-musl/release/gvm
            install_command: |
              sudo apt-get update
              sudo apt-get install -y musl-tools
            linker: ""
          - archive_target: linux-aarch64
            rust_target: aarch64-unknown-linux-gnu
            binary_path: ./target/aarch64-unknown-linux-gnu/release/gvm
            install_command: |
              sudo apt-get update
              sudo apt-get install -y gcc-aarch64-linux-gnu
            linker: aarch64-linux-gnu-gcc
    env:
      CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: ${{ matrix.linker }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Derive release version
        id: release_meta
        run: echo "version=${GITHUB_REF_NAME#release-}" >> "$GITHUB_OUTPUT"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - name: Install system dependencies
        run: ${{ matrix.install_command }}

      - name: Build release binary
        run: cargo build --locked --release --target "${{ matrix.rust_target }}"

      - name: Package release archive
        run: |
          chmod +x ./scripts/build-release-archive.sh
          mkdir -p dist
          ./scripts/build-release-archive.sh \
            "${{ steps.release_meta.outputs.version }}" \
            "${{ matrix.archive_target }}" \
            "${{ matrix.binary_path }}" \
            dist

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-dist-${{ matrix.archive_target }}
          path: dist/*

  publish-release:
    needs: build-release
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Derive release version
        id: release_meta
        run: echo "version=${GITHUB_REF_NAME#release-}" >> "$GITHUB_OUTPUT"

      - name: Download packaged artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: release-dist-*
          merge-multiple: true
          path: dist

      - name: Generate release notes
        run: |
          previous_tag="$(git tag -l 'release-*' | grep -Fxv "${GITHUB_REF_NAME}" | sort -V | tail -n 1 || true)"
          if [ -n "${previous_tag}" ]; then
            range="${previous_tag}..HEAD"
          else
            range="HEAD"
          fi
          RANGE="${range}" python - <<'PY'
          import os
          import subprocess

          range_spec = os.environ["RANGE"]
          output = subprocess.check_output(
              ["git", "log", "--no-merges", "--format=%s", range_spec],
              text=True,
          )
          titles = [line.strip() for line in output.splitlines() if line.strip()]

          groups = [
              ("Features", ("feat:",)),
              ("Fixes", ("fix:",)),
              ("Docs", ("docs:",)),
              ("Build", ("build:", "config:", "chore:", "ci:")),
          ]
          grouped = {name: [] for name, _ in groups}
          other = []

          for title in titles:
              lowered = title.lower()
              matched = False
              for name, prefixes in groups:
                  if lowered.startswith(prefixes):
                      grouped[name].append(title)
                      matched = True
                      break
              if not matched:
                  other.append(title)

          lines = ["## What's Changed", ""]
          emitted = False
          for name, _ in groups:
              entries = grouped[name]
              if not entries:
                  continue
              emitted = True
              lines.append(f"### {name}")
              lines.extend(f"- {entry}" for entry in entries[:8])
              lines.append("")

          if other:
              emitted = True
              lines.append("### Other")
              lines.extend(f"- {entry}" for entry in other[:8])
              lines.append("")

          if not emitted:
              lines.extend(["- Initial public release", ""])

          lines.extend(
              [
                  "## Downloads",
                  "",
                  "- linux-x86_64",
                  "- linux-aarch64",
                  "",
                  "## Install",
                  "",
                  "```bash",
                  "paru -S gvm-bin",
                  "# or",
                  "yay -S gvm-bin",
                  "```",
                  "",
              ]
          )

          with open("dist/release-notes.md", "w", encoding="utf-8") as handle:
              handle.write("\n".join(lines))
          PY

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ steps.release_meta.outputs.version }}
          body_path: dist/release-notes.md
          files: |
            dist/*.tar.gz
            dist/*.sha256

      - name: Remove stale release assets
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ steps.release_meta.outputs.version }}
        run: |
          python - <<'PY'
          import json
          import os
          import urllib.request

          repo = os.environ["GITHUB_REPOSITORY"]
          tag = os.environ["GITHUB_REF_NAME"]
          token = os.environ["GH_TOKEN"]
          version = os.environ["VERSION"]
          wanted = {
              f"gvm-{version}-linux-x86_64.tar.gz",
              f"gvm-{version}-linux-x86_64.tar.gz.sha256",
              f"gvm-{version}-linux-aarch64.tar.gz",
              f"gvm-{version}-linux-aarch64.tar.gz.sha256",
          }
          headers = {
              "Authorization": f"Bearer {token}",
              "Accept": "application/vnd.github+json",
              "X-GitHub-Api-Version": "2022-11-28",
          }
          release_url = f"https://api.github.com/repos/{repo}/releases/tags/{tag}"
          request = urllib.request.Request(release_url, headers=headers)
          with urllib.request.urlopen(request) as response:
              release = json.load(response)

          prefix = f"gvm-{version}-"
          for asset in release.get("assets", []):
              name = asset["name"]
              if name.startswith(prefix) and name not in wanted:
                  delete = urllib.request.Request(
                      asset["url"],
                      headers=headers,
                      method="DELETE",
                  )
                  with urllib.request.urlopen(delete):
                      pass
                  print(f"deleted {name}")
          PY

  publish-aur:
    needs: publish-release
    runs-on: ubuntu-latest

    steps:
      - name: Check AUR secret
        id: aur
        env:
          AUR_SSH_PRIVATE_KEY: ${{ secrets.AUR_SSH_PRIVATE_KEY }}
        run: |
          if [ -n "${AUR_SSH_PRIVATE_KEY}" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Check out repository
        if: ${{ steps.aur.outputs.enabled == 'true' }}
        uses: actions/checkout@v4

      - name: Derive release version
        if: ${{ steps.aur.outputs.enabled == 'true' }}
        id: release_meta
        run: echo "version=${GITHUB_REF_NAME#release-}" >> "$GITHUB_OUTPUT"

      - name: Download packaged artifacts
        if: ${{ steps.aur.outputs.enabled == 'true' }}
        uses: actions/download-artifact@v4
        with:
          pattern: release-dist-*
          merge-multiple: true
          path: dist

      - name: Start SSH agent
        if: ${{ steps.aur.outputs.enabled == 'true' }}
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.AUR_SSH_PRIVATE_KEY }}

      - name: Trust AUR host key
        if: ${{ steps.aur.outputs.enabled == 'true' }}
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan aur.archlinux.org >> ~/.ssh/known_hosts

      - name: Publish AUR package
        if: ${{ steps.aur.outputs.enabled == 'true' }}
        env:
          GIT_AUTHOR_NAME: github-actions[bot]
          GIT_AUTHOR_EMAIL: 41898282+github-actions[bot]@users.noreply.github.com
          GIT_COMMITTER_NAME: github-actions[bot]
          GIT_COMMITTER_EMAIL: 41898282+github-actions[bot]@users.noreply.github.com
        run: |
          chmod +x ./scripts/render-aur-package.sh
          VERSION="${{ steps.release_meta.outputs.version }}"
          X86_64_SHA="$(cut -d' ' -f1 "dist/gvm-${VERSION}-linux-x86_64.tar.gz.sha256")"
          AARCH64_SHA="$(cut -d' ' -f1 "dist/gvm-${VERSION}-linux-aarch64.tar.gz.sha256")"
          WORKDIR="$(mktemp -d)"
          trap 'rm -rf "${WORKDIR}"' EXIT INT TERM
          REPO_DIR="${WORKDIR}/${AUR_PACKAGE_NAME}"

          git clone "ssh://aur@aur.archlinux.org/${AUR_PACKAGE_NAME}.git" "${REPO_DIR}"

          CURRENT_PKGVER=
          CURRENT_PKGREL=
          if [ -f "${REPO_DIR}/PKGBUILD" ]; then
            CURRENT_PKGVER="$(sed -n 's/^pkgver=//p' "${REPO_DIR}/PKGBUILD" | head -n 1)"
            CURRENT_PKGREL="$(sed -n 's/^pkgrel=//p' "${REPO_DIR}/PKGBUILD" | head -n 1)"
          fi
          CANDIDATE_PKGREL=1
          if [ "${CURRENT_PKGVER}" = "${VERSION}" ] && [ -n "${CURRENT_PKGREL}" ]; then
            CANDIDATE_PKGREL="${CURRENT_PKGREL}"
          fi

          render_pkgbuild() {
            ./scripts/render-aur-package.sh \
              "${REPO_DIR}" \
              "${AUR_PACKAGE_NAME}" \
              "${VERSION}" \
              "$1" \
              "${{ github.repository }}" \
              x86_64 "${X86_64_SHA}" \
              aarch64 "${AARCH64_SHA}"
          }

          render_pkgbuild "${CANDIDATE_PKGREL}"
          cd "${REPO_DIR}"
          git add PKGBUILD .SRCINFO
          if git diff --cached --quiet; then
            echo "AUR package is already up to date"
            exit 0
          fi

          if [ "${CURRENT_PKGVER}" = "${VERSION}" ] && [ -n "${CURRENT_PKGREL}" ]; then
            NEXT_PKGREL="$((CURRENT_PKGREL + 1))"
            cd "${GITHUB_WORKSPACE}"
            render_pkgbuild "${NEXT_PKGREL}"
            cd "${REPO_DIR}"
            git add PKGBUILD .SRCINFO
          fi

          PKGREL="$(sed -n 's/^pkgrel=//p' PKGBUILD | head -n 1)"
          git commit -m "Update to ${VERSION}-${PKGREL}"
          git push origin HEAD:master

      - name: Skip AUR publish
        if: ${{ steps.aur.outputs.enabled != 'true' }}
        run: echo "AUR_SSH_PRIVATE_KEY is not configured; skipping AUR publish"
